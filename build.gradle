plugins {
    id 'java'
    id 'application'
}

group = 'com.railway'
version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    // JUnit 5 dependencies for unit testing
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.1'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.1'
}

application {
    // Define the main class for the executable jar and run task
    mainClass = 'Main'
}

// Ensure compatibility with modern Java
java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

// Tell Gradle where our source code and test code live
sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
    }
    test {
        java {
            srcDirs = ['test']
        }
    }
}

// Configure the jar task to include the Main-Class in the Manifest
jar {
    manifest {
        attributes(
            'Main-Class': 'Main'
        )
    }
}

// Tell Gradle to use JUnit 5 for tests
test {
    useJUnitPlatform()
}
